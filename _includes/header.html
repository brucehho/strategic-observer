<header class="site-header">
  <!-- Layer 1: Logo bar -->
  <div class="site-logo-bar">
    <a class="site-logo" href="{% if page.layout == 'home-en' %}{{ '/en/' | relative_url }}{% else %}{{ '/' | relative_url }}{% endif %}">
      <span class="logo-mark"></span>
      <span class="logo-body">
        <span class="logo-text">地缘政治与思想观察</span>
        <span class="logo-tagline">Strategic Observer</span>
      </span>
    </a>
    <div class="lang-toggle">
      <a href="{{ '/' | relative_url }}" class="lang-btn{% if page.layout == 'home' %} active{% endif %}" onclick="localStorage.setItem('siteLang','zh')">中文</a>
      <span class="lang-sep">·</span>
      <a href="{{ '/en/' | relative_url }}" class="lang-btn{% if page.layout == 'home-en' %} active{% endif %}" onclick="localStorage.setItem('siteLang','en')">EN</a>
    </div>
  </div>
  {% if page.layout == 'home-en' %}
  <script>localStorage.setItem('siteLang','en');</script>
  {% elsif page.layout == 'home' %}
  <script>localStorage.setItem('siteLang','zh');</script>
  {% endif %}

  <!-- Layer 2: Single combined nav -->
  <nav class="nav-main">
    {% if page.layout == 'home-en' %}
        <a href="{{ '/en/' | relative_url }}">Home</a>
        <a href="{{ '/tags/中东/' | relative_url }}?lang=en">Middle East</a>
        <a href="{{ '/tags/金融/' | relative_url }}?lang=en">Finance</a>
        <a href="{{ '/tags/经济/' | relative_url }}?lang=en">Economy</a>
        <a href="{{ '/tags/中美/' | relative_url }}?lang=en">China-US</a>
        <a href="{{ '/tags/日本/' | relative_url }}?lang=en">Japan</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
    {% else %}
      <a href="{{ '/' | relative_url }}">首页</a>
      <a href="{{ '/tags/中东/' | relative_url }}">中东</a>
      <a href="{{ '/tags/金融/' | relative_url }}">金融</a>
      <a href="{{ '/tags/经济/' | relative_url }}">经济</a>
      <a href="{{ '/tags/中美/' | relative_url }}">中美</a>
      <a href="{{ '/tags/日本/' | relative_url }}">日本</a>
      <a href="{{ '/about/' | relative_url }}">关于</a>
    {% endif %}
  </nav>
</header>
