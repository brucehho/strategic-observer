<header class="site-header">
  <!-- Layer 1: Logo bar -->
  <div class="site-logo-bar">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <span class="logo-mark"></span>
      <span class="logo-body">
        <span class="logo-text">地缘政治与思想观察</span>
        <span class="logo-tagline">Strategic Observer</span>
      </span>
    </a>
    <div class="lang-toggle">
      <a href="{{ '/' | relative_url }}" class="lang-btn{% if page.layout == 'home' %} active{% endif %}">中文</a>
      <span class="lang-sep">·</span>
      <a href="{{ '/en/' | relative_url }}" class="lang-btn{% if page.layout == 'home-en' %} active{% endif %}">EN</a>
    </div>
  </div>

  <!-- Layer 2: Single combined nav -->
  <nav class="nav-main">
    {% if page.layout == 'home-en' %}
      <a href="{{ '/en/' | relative_url }}">Home</a>
      <a href="{{ '/tags/中东/' | relative_url }}">Middle East</a>
      <a href="{{ '/tags/金融/' | relative_url }}">Finance</a>
      <a href="{{ '/tags/经济/' | relative_url }}">Economy</a>
      <a href="{{ '/tags/中美/' | relative_url }}">China-US</a>
      <a href="{{ '/tags/日本/' | relative_url }}">Japan</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
    {% else %}
      <a href="{{ '/' | relative_url }}">首页</a>
      <a href="{{ '/tags/中东/' | relative_url }}">中东</a>
      <a href="{{ '/tags/金融/' | relative_url }}">金融</a>
      <a href="{{ '/tags/经济/' | relative_url }}">经济</a>
      <a href="{{ '/tags/中美/' | relative_url }}">中美</a>
      <a href="{{ '/tags/日本/' | relative_url }}">日本</a>
      <a href="{{ '/about/' | relative_url }}">关于</a>
    {% endif %}
  </nav>
</header>
